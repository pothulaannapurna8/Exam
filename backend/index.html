<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamBridge AI | Premium GATE Analyzer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #FF4B4B;
            --primary-glow: rgba(255, 75, 75, 0.4);
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(255, 75, 75, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(56, 189, 248, 0.1) 0%, transparent 20%);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #94a3b8;
        }

        select,
        textarea,
        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        select:focus,
        textarea:focus,
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .analyze-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1rem;
        }

        .analyze-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px var(--primary-glow);
            background: #ff3333;
        }

        /* Results Styling */
        .results-header {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric {
            text-align: center;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid var(--glass-border);
        }

        .metric h3 {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .metric div {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .video-card {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            transition: all 0.3s;
            height: 100%;
        }

        .video-card:hover {
            transform: scale(1.02);
            border-color: var(--primary);
        }

        .video-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .video-content {
            padding: 1rem;
        }

        .video-title {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            color: #fff;
        }

        .video-meta {
            font-size: 0.75rem;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
        }

        .watch-btn {
            display: block;
            width: 100%;
            padding: 0.6rem;
            background: rgba(255, 255, 255, 0.1);
            text-align: center;
            color: white;
            text-decoration: none;
            margin-top: 0.8rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: background 0.3s;
        }

        .watch-btn:hover {
            background: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            text-align: left;
            padding: 1rem;
            color: #94a3b8;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: 2px solid var(--glass-border);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.9rem;
        }

        .status-high {
            color: #f87171;
            font-weight: bold;
        }

        .status-medium {
            color: #fbbf24;
        }

        .status-low {
            color: #34d399;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none;
        }

        #loader {
            text-align: center;
            padding: 2rem;
            font-weight: 600;
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>ExamBridge AI</h1>
            <p style="color: #94a3b8; font-size: 1.2rem;">Syllabus Gap Detection & Learning Path Bridge</p>
        </header>

        <main>
            <div class="glass-card" id="input-section">
                <form id="analyze-form">
                    <div class="grid">
                        <div class="input-col">
                            <div class="input-group">
                                <label>Target GATE Branch</label>
                                <select name="selected_branch" id="branch-select" required>
                                    <option value="" disabled selected>Select your branch</option>
                                    <option value="DA_2026">DA_2026 (Data Science & AI)</option>
                                    <option value="CS_2026">CS_2026 (Computer Science)</option>
                                    <option value="EC_2026">EC_2026 (Electronics)</option>
                                    <option value="EE_2026">EE_2026 (Electrical)</option>
                                    <option value="ME_2026">ME_2026 (Mechanical)</option>
                                    <option value="CE_2026">CE_2026 (Civil)</option>
                                </select>
                            </div>

                            <div class="input-group">
                                <label>Input Method</label>
                                <select id="method-select" name="syllabus_type">
                                    <option value="Upload PDF">Upload PDF</option>
                                    <option value="Paste Text">Paste Text</option>
                                    <option value="PDF Link">PDF Link</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-col">
                            <div id="method-upload" class="input-group method-input">
                                <label>Syllabus PDF</label>
                                <input type="file" name="college_pdf">
                            </div>

                            <div id="method-text" class="input-group method-input hidden">
                                <label>Syllabus Text</label>
                                <textarea name="pasted_text" rows="5"
                                    placeholder="Paste your college syllabus content here..."></textarea>
                            </div>

                            <div id="method-url" class="input-group method-input hidden">
                                <label>PDF URL</label>
                                <input type="text" name="syllabus_url" placeholder="https://example.com/syllabus.pdf">
                            </div>

                            <button type="submit" class="analyze-btn">🚀 Analyze Syllabus Gaps</button>
                        </div>
                    </div>
                </form>
            </div>

            <div id="loader" class="hidden">🔬 Performing Deep Semantic Analysis...</div>

            <div id="results-section" class="hidden">
                <div class="results-header">
                    <div class="metric">
                        <h3>Overall Match</h3>
                        <div id="val-match">0%</div>
                    </div>
                    <div class="metric">
                        <h3>Critical Gaps</h3>
                        <div id="val-gaps">0</div>
                    </div>
                    <div class="metric">
                        <h3>Total Topics</h3>
                        <div id="val-topics">0</div>
                    </div>
                </div>

                <div class="grid">
                    <div class="glass-card">
                        <h2 style="margin-bottom: 1.5rem;">🔎 Gap Mapping</h2>
                        <div style="overflow-x: auto; max-height: 500px;">
                            <table>
                                <thead>
                                    <tr>
                                        <th>GATE Topic</th>
                                        <th>Status</th>
                                        <th>Match %</th>
                                    </tr>
                                </thead>
                                <tbody id="mapping-body">
                                    <!-- Dynamic rows -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="glass-card">
                        <h2 style="margin-bottom: 0.5rem;">🔥 Learning Bridge</h2>
                        <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem;">Recommended lectures for
                            high priority gaps:</p>
                        <div class="video-grid" id="video-grid">
                            <!-- Dynamic video cards -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('analyze-form');
        const methodSelect = document.getElementById('method-select');
        const inputs = document.querySelectorAll('.method-input');

        methodSelect.addEventListener('change', (e) => {
            inputs.forEach(el => el.classList.add('hidden'));
            if (e.target.value === 'Upload PDF') document.getElementById('method-upload').classList.remove('hidden');
            if (e.target.value === 'Paste Text') document.getElementById('method-text').classList.remove('hidden');
            if (e.target.value === 'PDF Link') document.getElementById('method-url').classList.remove('hidden');
        });

        form.onsubmit = async (e) => {
            e.preventDefault();
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('results-section').classList.add('hidden');

            const formData = new FormData(form);
            const branch = formData.get('selected_branch');
            const HF_API_URL = `https://prasanthikovvuri47-exambridge-nexus.hf.space/analyze/${branch}`;

            try {
                const response = await fetch(HF_API_URL, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                // Update metrics
                document.getElementById('val-match').innerText = data.overall_similarity + '%';
                document.getElementById('val-gaps').innerText = data.critical_gaps;
                document.getElementById('val-topics').innerText = data.gate_topic_count;

                // Update Table
                const tbody = document.getElementById('mapping-body');
                tbody.innerHTML = '';
                data.results.forEach(r => {
                    const statusClass = r.priority.includes('High') ? 'status-high' : r.priority.includes('Medium') ? 'status-medium' : 'status-low';
                    tbody.innerHTML += `
                        <tr>
                            <td>${r.gate_topic}</td>
                            <td class="${statusClass}">${r.priority}</td>
                            <td>${r.similarity}%</td>
                        </tr>
                    `;
                });

                // Update Videos
                const videoGrid = document.getElementById('video-grid');
                videoGrid.innerHTML = '';
                if (data.recommendations.length === 0) {
                    videoGrid.innerHTML = '<p style="color: #34d399; font-weight: 600;">✅ Excellent! Your syllabus covers all critical GATE topics.</p>';
                } else {
                    data.recommendations.forEach(rec => {
                        const summaryHtml = rec.video.summary ? `
                            <div style="margin-top: 1rem; padding: 0.8rem; background: rgba(255, 75, 75, 0.1); border-radius: 8px; font-size: 0.8rem; border-left: 3px solid var(--primary);">
                                <strong style="color: var(--primary); display: block; margin-bottom: 0.3rem;">🧠 AI Summary</strong>
                                <div style="color: #cbd5e1; line-height: 1.5;">${rec.video.summary}</div>
                            </div>
                        ` : '';

                        videoGrid.innerHTML += `
                            <div class="video-card">
                                <img src="${rec.video.thumbnail}" alt="">
                                <div class="video-content">
                                    <div class="video-title">${rec.video.title}</div>
                                    <div class="video-meta">
                                        <span>📺 ${rec.video.channel}</span>
                                        <span>⏳ ${rec.video.duration}</span>
                                    </div>
                                    ${summaryHtml}
                                    <a href="${rec.video.url}" target="_blank" class="watch-btn">WATCH LECTURE</a>
                                </div>
                            </div>
                        `;
                    });
                }

                document.getElementById('results-section').classList.remove('hidden');
            } catch (err) {
                alert('Analysis failed: ' + err.message);
            } finally {
                document.getElementById('loader').classList.add('hidden');
                window.scrollTo({ top: document.getElementById('results-section').offsetTop - 20, behavior: 'smooth' });
            }
        };
    </script>
</body>

</html>
